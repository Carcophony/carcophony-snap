<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rebus Snap – Mystery Car 1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&display=swap');

  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --dark: #0e0e0e;
    --dark2: #1a1a1a;
    --dark3: #252525;
    --cream: #f5ead7;
    --green: #4caf7d;
    --red: #e04848;
    --shadow: 0 4px 24px rgba(0,0,0,0.7);
  }

  * { box-sizing:border-box; margin:0; padding:0; }

  body {
    font-family:'Oswald',sans-serif;
    background:var(--dark); color:var(--cream);
    min-height:100vh; overflow-x:hidden;
    background-image:
      repeating-linear-gradient(45deg,rgba(201,168,76,0.03) 0,rgba(201,168,76,0.03) 1px,transparent 1px,transparent 50px),
      repeating-linear-gradient(-45deg,rgba(201,168,76,0.03) 0,rgba(201,168,76,0.03) 1px,transparent 1px,transparent 50px);
  }

  .view { display:none; min-height:100vh; }
  .view.active { display:flex; flex-direction:column; align-items:center; }

  /* ===== MENU ===== */
  #menu { padding:28px 16px 40px; justify-content:center; text-align:center; }

  .logo {
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(44px,11vw,76px); letter-spacing:5px;
    background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 50%,var(--gold) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    line-height:1; filter:drop-shadow(0 2px 8px rgba(201,168,76,0.4)); margin-bottom:4px;
  }

  .logo-sub { font-size:11px; letter-spacing:5px; color:var(--gold); text-transform:uppercase; opacity:0.7; margin-bottom:20px; }

  /* Menu shows the card as a circle — scrambled appearance via CSS filter */
  .menu-puzzle {
    width:min(82vw,340px); height:min(82vw,340px);
    border-radius:50%; overflow:hidden;
    border:3px solid var(--gold);
    box-shadow:0 0 60px rgba(201,168,76,0.25),0 0 0 8px rgba(14,14,14,0.8);
    margin-bottom:18px;
    animation:mysteryPulse 3s ease-in-out infinite;
    position:relative;
  }

  /* Show the card as a 3x3 scrambled grid preview on menu */
  .menu-grid {
    display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
    width:100%; height:100%; gap:2px; background:#000;
  }

  .menu-tile {
    background-size:300% 300%;
    background-repeat:no-repeat;
    background-image:var(--card-img);
  }

  @keyframes mysteryPulse {
    0%,100% { box-shadow:0 0 40px rgba(201,168,76,0.2),0 0 0 8px rgba(14,14,14,0.8); }
    50%      { box-shadow:0 0 80px rgba(201,168,76,0.5),0 0 0 8px rgba(14,14,14,0.8); }
  }

  .mystery-label { font-family:'Bebas Neue',sans-serif; font-size:clamp(28px,7vw,42px); letter-spacing:5px; color:var(--cream); margin-bottom:4px; }
  .mystery-sub { font-size:12px; letter-spacing:3px; color:var(--gold); opacity:0.6; text-transform:uppercase; margin-bottom:20px; }
  .best-line { font-size:13px; color:rgba(245,234,215,0.4); margin-bottom:18px; min-height:20px; letter-spacing:1px; }
  .best-line.set { color:var(--green); }

  .btn-start {
    background:linear-gradient(135deg,var(--gold),#a87c2e);
    color:#000; border:none; padding:16px 52px; border-radius:12px;
    font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:4px;
    cursor:pointer; transition:all 0.2s; box-shadow:0 4px 20px rgba(201,168,76,0.4);
  }
  .btn-start:hover { transform:translateY(-2px); box-shadow:0 6px 28px rgba(201,168,76,0.6); }

  /* ===== PLAY ===== */
  #play { padding:12px 16px 24px; }

  .play-header { width:100%; max-width:500px; display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .play-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(20px,5vw,30px); letter-spacing:4px; color:var(--gold); }

  .sound-toggle {
    background:var(--dark3); border:1px solid rgba(201,168,76,0.3);
    color:var(--cream); padding:8px 14px; border-radius:8px;
    cursor:pointer; font-size:14px; font-family:'Oswald',sans-serif; transition:all 0.2s;
  }
  .sound-toggle:hover { border-color:var(--gold); }

  .stats-bar { display:flex; gap:10px; margin-bottom:12px; width:100%; max-width:500px; }
  .stat-box { background:var(--dark2); border:1px solid rgba(201,168,76,0.2); border-radius:10px; padding:10px 16px; text-align:center; flex:1; }
  .stat-box .stat-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--gold); opacity:0.7; }
  .stat-box .stat-value { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--cream); line-height:1.1; }

  .puzzle-wrapper {
    position:relative;
    width:min(92vw,calc(92vh - 260px),460px);
    aspect-ratio:1; margin-bottom:12px;
  }

  .puzzle-grid {
    display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr);
    width:100%; height:100%; gap:3px; background:#000;
    border:2px solid rgba(201,168,76,0.35); border-radius:10px; overflow:hidden; box-shadow:var(--shadow);
  }

  .tile {
    position:relative; cursor:pointer; overflow:hidden;
    transition:filter 0.12s, transform 0.12s;
    background-size:300% 300%; background-repeat:no-repeat;
  }
  .tile:hover { filter:brightness(1.12); }
  .tile:active { transform:scale(0.96); }
  .tile.ghost { cursor:default; }
  .tile.ghost .ghost-img { position:absolute; inset:0; background-size:300% 300%; background-repeat:no-repeat; opacity:0.18; pointer-events:none; }
  .tile.ghost:hover { filter:none; }
  .tile.ghost:active { transform:none; }
  .puzzle-grid.solved .tile { cursor:default; transition:opacity 0.6s,filter 0.6s; }
  .puzzle-grid.solved .tile.ghost .ghost-img { opacity:1; transition:opacity 0.6s; }
  .puzzle-grid.solved .tile { filter:brightness(1) !important; }

  .tile-num { position:absolute; bottom:4px; right:5px; font-size:11px; font-weight:900; color:#fff; text-shadow:0 0 3px #000,1px 1px 0 #000,-1px -1px 0 #000; pointer-events:none; opacity:0.7; }

  .play-buttons { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }

  .btn-primary { background:linear-gradient(135deg,var(--gold),#a87c2e); color:#000; border:none; padding:12px 24px; border-radius:10px; font-family:'Oswald',sans-serif; font-weight:700; font-size:14px; letter-spacing:1px; cursor:pointer; transition:all 0.2s; box-shadow:0 3px 12px rgba(201,168,76,0.3); }
  .btn-primary:hover { transform:translateY(-1px); }

  .btn-secondary { background:var(--dark3); color:var(--cream); border:1px solid rgba(201,168,76,0.3); padding:12px 24px; border-radius:10px; font-family:'Oswald',sans-serif; font-weight:400; font-size:14px; letter-spacing:1px; cursor:pointer; transition:all 0.2s; }
  .btn-secondary:hover { border-color:var(--gold); }

  /* ===== REBUS ===== */
  #rebus { padding:16px 16px 24px; justify-content:center; }

  .rebus-header { text-align:center; margin-bottom:10px; }
  .rebus-title {
    font-family:'Bebas Neue',sans-serif; font-size:clamp(32px,8vw,56px); letter-spacing:5px;
    background:linear-gradient(135deg,var(--gold),var(--gold-light),var(--gold));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter:drop-shadow(0 0 20px rgba(201,168,76,0.5)); animation:pulse 2s ease-in-out infinite; line-height:1;
  }
  @keyframes pulse { 0%,100%{filter:drop-shadow(0 0 20px rgba(201,168,76,0.5));}  50%{filter:drop-shadow(0 0 50px rgba(201,168,76,0.95));} }

  .rebus-sub { font-size:12px; letter-spacing:3px; color:var(--gold); opacity:0.7; text-transform:uppercase; margin-top:4px; }

  .rebus-timer { font-family:'Bebas Neue',sans-serif; font-size:clamp(40px,10vw,68px); letter-spacing:4px; color:var(--cream); text-align:center; line-height:1; margin-bottom:8px; transition:color 0.3s; }
  .rebus-timer.urgent { color:#ff8080; animation:timerPulse 0.5s ease-in-out infinite; }
  @keyframes timerPulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }

  /* Rebus screen shows the COMPLETE assembled card as a circle */
  .rebus-card-wrap {
    width:min(82vw,340px); height:min(82vw,340px);
    border-radius:50%; overflow:hidden;
    border:3px solid var(--gold);
    box-shadow:0 0 40px rgba(201,168,76,0.3);
    margin:0 auto 16px;
  }

  .rebus-card-wrap img { width:100%; height:100%; object-fit:cover; }

  .rebus-input-wrap { width:100%; max-width:360px; margin:0 auto 12px; display:flex; flex-direction:column; gap:8px; }

  .rebus-input {
    width:100%; background:var(--dark2); border:2px solid rgba(201,168,76,0.4); color:var(--cream);
    padding:14px 18px; border-radius:10px; font-family:'Bebas Neue',sans-serif;
    font-size:22px; letter-spacing:3px; text-align:center; outline:none; transition:border-color 0.2s; text-transform:uppercase;
  }
  .rebus-input:focus { border-color:var(--gold); }
  .rebus-input.correct { border-color:var(--green); color:var(--green); }
  .rebus-input.wrong { border-color:var(--red); animation:shake 0.3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }

  .rebus-hint { font-size:12px; letter-spacing:2px; color:rgba(245,234,215,0.4); text-align:center; text-transform:uppercase; }
  .rebus-hint span { color:var(--gold); }

  .rebus-submit { width:100%; padding:14px; background:linear-gradient(135deg,var(--gold),#a87c2e); color:#000; border:none; border-radius:10px; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:3px; cursor:pointer; transition:all 0.2s; box-shadow:0 3px 12px rgba(201,168,76,0.3); }
  .rebus-submit:hover { transform:translateY(-1px); }

  .rebus-skip { background:none; border:1px solid rgba(245,234,215,0.15); color:rgba(245,234,215,0.3); padding:8px 20px; border-radius:8px; font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:2px; cursor:pointer; transition:all 0.2s; text-transform:uppercase; margin:0 auto; display:block; }
  .rebus-skip:hover { border-color:rgba(245,234,215,0.3); color:rgba(245,234,215,0.5); }

  /* ===== WIN ===== */
  #win { padding:24px 16px; justify-content:center; text-align:center; position:relative; overflow:hidden; }

  .win-congrats { font-family:'Bebas Neue',sans-serif; font-size:clamp(52px,14vw,96px); letter-spacing:6px; background:linear-gradient(135deg,var(--gold) 0%,var(--gold-light) 50%,var(--gold) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 20px rgba(201,168,76,0.5)); animation:pulse 2s ease-in-out infinite; margin-bottom:4px; line-height:1; }
  .win-car-reveal { font-family:'Bebas Neue',sans-serif; font-size:clamp(22px,5vw,34px); letter-spacing:4px; color:var(--cream); margin-bottom:4px; }
  .win-subtitle { font-size:13px; color:var(--cream); opacity:0.7; margin-bottom:4px; letter-spacing:1px; font-family:'Oswald',sans-serif; font-weight:300; }
  .win-pb { font-size:15px; color:var(--gold); margin-bottom:16px; font-family:'Oswald',sans-serif; letter-spacing:1px; }

  .win-img-wrap { position:relative; width:min(72vw,280px); height:min(72vw,280px); border-radius:14px; overflow:hidden; border:2px solid var(--gold); box-shadow:0 0 40px rgba(201,168,76,0.35); margin:0 auto 20px; animation:revealImg 0.8s ease-out both; }
  @keyframes revealImg { 0%{opacity:0;transform:scale(0.8);} 100%{opacity:1;transform:scale(1);} }
  .win-img-wrap img { width:100%; height:100%; object-fit:cover; }

  .win-stats { display:flex; gap:10px; justify-content:center; margin-bottom:16px; flex-wrap:wrap; }
  .win-stat { background:var(--dark2); border:1px solid rgba(201,168,76,0.2); border-radius:10px; padding:10px 14px; text-align:center; min-width:74px; }
  .win-stat-label { font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--gold); opacity:0.7; }
  .win-stat-value { font-family:'Bebas Neue',sans-serif; font-size:22px; color:var(--cream); line-height:1.1; }

  .win-buttons { display:flex; flex-direction:column; gap:10px; width:100%; max-width:300px; margin:0 auto; }

  .btn-share { background:linear-gradient(135deg,#1a91da,#0d6cb5); color:#fff; border:none; padding:14px 28px; border-radius:10px; font-family:'Oswald',sans-serif; font-weight:600; font-size:15px; letter-spacing:1px; cursor:pointer; transition:all 0.2s; }
  .btn-share:hover { transform:translateY(-1px); box-shadow:0 5px 18px rgba(29,161,242,0.3); }

  .confetti-container { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:100; overflow:hidden; }
  .confetti-piece { position:absolute; top:-20px; opacity:0; animation:confettiFall linear forwards; }
  @keyframes confettiFall { 0%{opacity:1;transform:translateY(0) rotate(0deg);} 100%{opacity:0;transform:translateY(110vh) rotate(720deg);} }
</style>
</head>
<body>

<audio id="snd-slide" preload="auto"><source src="sounds/slide.mp3" type="audio/mpeg"></audio>
<audio id="snd-win" preload="auto"><source src="sounds/win.mp3" type="audio/mpeg"></audio>

<div class="confetti-container" id="confetti"></div>

<!-- ===== MENU ===== -->
<div id="menu" class="view active">
  <div class="logo">Rebus<br>Snap</div>
  <div class="logo-sub">Slide · Reveal · Decode</div>

  <!-- Scrambled preview of the card -->
  <div class="menu-puzzle" id="menuPuzzle">
    <div class="menu-grid" id="menuGrid"></div>
  </div>

  <div class="mystery-label">Mystery Car 1</div>
  <div class="mystery-sub">Solve the puzzle · Crack the code</div>
  <div class="best-line" id="bestLine">Not yet solved</div>
  <button class="btn-start" onclick="startGame()">Start</button>
</div>

<!-- ===== PLAY ===== -->
<div id="play" class="view">
  <div class="play-header" style="max-width:500px;width:100%;">
    <div class="play-title">Mystery Car 1</div>
    <button class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊 On</button>
  </div>
  <div class="stats-bar">
    <div class="stat-box"><div class="stat-label">Time</div><div class="stat-value" id="timerDisplay">00:00</div></div>
    <div class="stat-box"><div class="stat-label">Moves</div><div class="stat-value" id="movesDisplay">0</div></div>
    <div class="stat-box"><div class="stat-label">Best</div><div class="stat-value" id="bestDisplay">—</div></div>
  </div>
  <div class="puzzle-wrapper" id="puzzleWrapper">
    <div class="puzzle-grid" id="puzzleGrid"></div>
  </div>
  <div class="play-buttons">
    <button class="btn-primary" onclick="restartGame()">Restart</button>
    <button class="btn-secondary" onclick="showView('menu'); stopTimer()">Menu</button>
  </div>
</div>

    <div class="rebus-title">Decode It</div>
    <div class="rebus-sub">Puzzle solved · Now crack the Rebus</div>

const CAR = {
  name: 'Saab 900 Turbo SPG',
  answers: ['saab 900 turbo spg','saab900turbospg','saab 900 spg','saab900spg','900 turbo spg','900turbospg']
};

const GRID = 3, N = 9, REBUS_TIME = 60;
let tiles=[], moves=0, seconds=0, timerInterval=null, timerStarted=false;
let soundOn=true, interacted=false, isWon=false;
let puzzleSeconds=0, rebusSeconds=0, rebusInterval=null, rebusTimeLeft=REBUS_TIME;

// Build scrambled menu preview
function buildMenuGrid() {
  const grid = document.getElementById('menuGrid');
  grid.innerHTML = '';
  // Fixed scrambled order for visual effect — not solvable from here, just looks mixed
  const order = [5,2,8,1,6,3,7,4,9]; // scrambled tile display order
  const size = document.getElementById('menuPuzzle').offsetWidth;
  const tileSize = Math.floor((size - 4) / 3);

  order.forEach(val => {
    const srcRow = Math.floor((val-1)/GRID);
    const srcCol = (val-1)%GRID;
    const tile = document.createElement('div');
    tile.className = 'menu-tile';
    tile.style.backgroundImage = `url(${CARD_SRC})`;
    tile.style.backgroundSize = `${tileSize*3+4}px ${tileSize*3+4}px`;
    tile.style.backgroundPosition = `-${srcCol*(tileSize+2)}px -${srcRow*(tileSize+2)}px`;
    grid.appendChild(tile);
  });
}

function lsKey(t){ return 'rsnap_mc1_'+t; }
function getBest(){ const t=localStorage.getItem(lsKey('time')); return t?parseInt(t):null; }
function saveBest(total,mv){
  const ex=getBest();
  if(ex===null||total<ex){ localStorage.setItem(lsKey('time'),total); localStorage.setItem(lsKey('moves'),mv); return true; }
  return false;
}
function fmtTime(s){ return Math.floor(s/60).toString().padStart(2,'0')+':'+(s%60).toString().padStart(2,'0'); }

function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  if(name==='menu'){ updateBest(); requestAnimationFrame(buildMenuGrid); }
}

function updateBest(){
  const b=getBest(), el=document.getElementById('bestLine');
  if(b!==null){ el.textContent='✅ Best: '+fmtTime(b); el.className='best-line set'; }
  else { el.textContent='Not yet solved'; el.className='best-line'; }
}

function solvedState(){ return [1,2,3,4,5,6,7,8,0]; }
function blankIdx(){ return tiles.indexOf(0); }

function getNeighbours(idx){
  const row=Math.floor(idx/GRID),col=idx%GRID,n=[];
  if(row>0) n.push(idx-GRID); if(row<GRID-1) n.push(idx+GRID);
  if(col>0) n.push(idx-1);   if(col<GRID-1) n.push(idx+1);
  return n;
}

function shuffle(count){
  tiles=solvedState(); let prev=-1;
  for(let i=0;i<count;i++){
    const blank=blankIdx();
    const nbrs=getNeighbours(blank).filter(n=>n!==prev);
    const pick=nbrs[Math.floor(Math.random()*nbrs.length)];
    prev=blank; tiles[blank]=tiles[pick]; tiles[pick]=0;
  }
}

function checkWin(){ for(let i=0;i<8;i++) if(tiles[i]!==i+1) return false; return tiles[8]===0; }

function renderGrid(){
  const grid=document.getElementById('puzzleGrid');
  if(isWon){ grid.classList.add('solved'); return; }
  grid.classList.remove('solved'); grid.innerHTML='';
  const wrapper=document.getElementById('puzzleWrapper');
  const size=wrapper.offsetWidth;
  const tileSize=Math.floor((size-4-6)/3);

  for(let i=0;i<N;i++){
    const val=tiles[i],isBlank=val===0;
    const solvedRow=Math.floor(i/GRID),solvedCol=i%GRID;
    const tile=document.createElement('div');
    tile.className='tile'+(isBlank?' ghost':'');

    if(!isBlank){
      const srcRow=Math.floor((val-1)/GRID),srcCol=(val-1)%GRID;
      tile.style.backgroundImage=`url(${CARD_SRC})`;
      tile.style.backgroundSize=`${tileSize*3+6}px ${tileSize*3+6}px`;
      tile.style.backgroundPosition=`-${srcCol*(tileSize+3)}px -${srcRow*(tileSize+3)}px`;
      const num=document.createElement('div');
      num.className='tile-num'; num.textContent=val;
      tile.appendChild(num);
    } else {
      const ghost=document.createElement('div');
      ghost.className='ghost-img';
      ghost.style.backgroundImage=`url(${CARD_SRC})`;
      ghost.style.backgroundSize=`${tileSize*3+6}px ${tileSize*3+6}px`;
      ghost.style.backgroundPosition=`-${solvedCol*(tileSize+3)}px -${solvedRow*(tileSize+3)}px`;
      tile.appendChild(ghost);
    }
    tile.onclick=()=>tryMove(i);
    grid.appendChild(tile);
  }
}

function tryMove(idx){
  if(isWon) return;
  const blank=blankIdx();
  if(!getNeighbours(blank).includes(idx)) return;
  if(!timerStarted){ startTimer(); timerStarted=true; }
  interacted=true;
  tiles[blank]=tiles[idx]; tiles[idx]=0;
  moves++;
  document.getElementById('movesDisplay').textContent=moves;
  playSound('slide');
  renderGrid();
  if(checkWin()) setTimeout(handlePuzzleWin,300);
}

function startTimer(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval=setInterval(()=>{ seconds++; document.getElementById('timerDisplay').textContent=fmtTime(seconds); },1000);
}
function stopTimer(){ if(timerInterval) clearInterval(timerInterval); timerInterval=null; }
function resetTimer(){ stopTimer(); seconds=0; timerStarted=false; document.getElementById('timerDisplay').textContent='00:00'; }

function startGame(){
  isWon=false; moves=0; puzzleSeconds=0; rebusSeconds=0;
  resetTimer();
  document.getElementById('movesDisplay').textContent='0';
  const b=getBest();
  document.getElementById('bestDisplay').textContent=b!==null?fmtTime(b):'—';
  shuffle(300);
  showView('play');
  requestAnimationFrame(()=>requestAnimationFrame(renderGrid));
  soundOn=localStorage.getItem('rsnap_sound')!=='off';
  document.getElementById('soundToggle').textContent=soundOn?'🔊 On':'🔇 Off';
}

function restartGame(){ startGame(); }

function handlePuzzleWin(){
  isWon=true; stopTimer(); puzzleSeconds=seconds;
  playSound('win');
  document.getElementById('puzzleGrid').classList.add('solved');
  renderGrid();
  setTimeout(showRebusScreen,1000);
}

function showRebusScreen(){
  const input=document.getElementById('rebusInput');
  input.value=''; input.className='rebus-input';
  rebusTimeLeft=REBUS_TIME;
  document.getElementById('rebusTimer').textContent=rebusTimeLeft;
  document.getElementById('rebusTimer').className='rebus-timer';
  if(rebusInterval) clearInterval(rebusInterval);
  rebusInterval=setInterval(()=>{
    rebusTimeLeft--;
    document.getElementById('rebusTimer').textContent=rebusTimeLeft;
    if(rebusTimeLeft<=10) document.getElementById('rebusTimer').className='rebus-timer urgent';
    if(rebusTimeLeft<=0){ clearInterval(rebusInterval); handleRebusTimeout(); }
  },1000);
  showView('rebus');
  setTimeout(()=>input.focus(),400);
}

function checkAnswer(){
  const input=document.getElementById('rebusInput');
  const raw=input.value.trim().toLowerCase().replace(/[^a-z0-9 ]/g,'').replace(/ +/g,' ');
  if(CAR.answers.includes(raw)){
    input.className='rebus-input correct';
    clearInterval(rebusInterval);
    rebusSeconds=REBUS_TIME-rebusTimeLeft;
    setTimeout(()=>handleFullWin(true),600);
  } else {
    input.className='rebus-input wrong';
    setTimeout(()=>{ input.className='rebus-input'; },500);
  }
}

function handleRebusTimeout(){ clearInterval(rebusInterval); rebusSeconds=REBUS_TIME; handleFullWin(false); }

function handleFullWin(decoded){
  const total=puzzleSeconds+(decoded?rebusSeconds:0);
  const isNew=saveBest(total,moves);
  document.getElementById('winSubtitle').textContent=decoded?'Puzzle solved and Rebus decoded!':'Puzzle solved — Rebus time expired';
  document.getElementById('winPB').textContent=isNew?'🎉 New Personal Best!':'Best: '+fmtTime(getBest());
  document.getElementById('winPuzzleTime').textContent=fmtTime(puzzleSeconds);
  document.getElementById('winRebusTime').textContent=decoded?fmtTime(rebusSeconds):'DNF';
  document.getElementById('winTotalTime').textContent=decoded?fmtTime(total):fmtTime(puzzleSeconds);
  document.getElementById('winMoves').textContent=moves;
  launchConfetti(); showView('win');
}

function shareResult(){
  const decoded=document.getElementById('winRebusTime').textContent!=='DNF';
  const total=parseInt(localStorage.getItem(lsKey('time'))||0);
  const text=decoded
    ? `🚗 Rebus Snap — Solved the puzzle AND decoded Mystery Car 1 in ${fmtTime(total)} (${moves} moves)! Can you? https://tinyurl.com/RebusPuzzleOne #RebusSnap`
    : `🚗 Rebus Snap — Solved the sliding puzzle but couldn't crack the Rebus! Can you? https://tinyurl.com/RebusPuzzleOne #RebusSnap`;
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text),'_blank');
}

function playSound(name){
  if(!soundOn||!interacted) return;
  const el=document.getElementById('snd-'+name);
  if(!el) return;
  try{ el.currentTime=0; el.play().catch(()=>{}); } catch(e){}
}

function toggleSound(){
  soundOn=!soundOn;
  localStorage.setItem('rsnap_sound',soundOn?'on':'off');
  document.getElementById('soundToggle').textContent=soundOn?'🔊 On':'🔇 Off';
}

function launchConfetti(){
  const container=document.getElementById('confetti');
  const colors=['#c9a84c','#f0d080','#fff','#4caf7d','#4169e1','#e04848','#e87db0'];
  for(let i=0;i<120;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    const color=colors[Math.floor(Math.random()*colors.length)];
    const left=Math.random()*100,delay=Math.random()*1.5,dur=2.5+Math.random()*2,size=6+Math.random()*10;
    p.style.cssText=`left:${left}%;background:${color};width:${size}px;height:${size*(Math.random()>0.5?1:2.2)}px;border-radius:${Math.random()>0.5?'50%':'0'};animation-duration:${dur}s;animation-delay:${delay}s;`;
    container.appendChild(p);
  }
  setTimeout(()=>{ container.innerHTML=''; },6000);
}

document.addEventListener('keydown',(e)=>{
  if(document.getElementById('rebus').classList.contains('active')&&e.key==='Enter'){ checkAnswer(); return; }
  if(document.getElementById('play').classList.contains('active')){
    const blank=blankIdx(); let target=-1;
    if(e.key==='ArrowUp')    target=blank+GRID;
    if(e.key==='ArrowDown')  target=blank-GRID;
    if(e.key==='ArrowLeft')  target=blank+1;
    if(e.key==='ArrowRight') target=blank-1;
    if(target>=0&&target<N&&getNeighbours(blank).includes(target)) tryMove(target);
    e.preventDefault();
  }
});

window.addEventListener('resize',()=>{
  if(document.getElementById('play').classList.contains('active')) requestAnimationFrame(renderGrid);
  if(document.getElementById('menu').classList.contains('active')) requestAnimationFrame(buildMenuGrid);
});

document.addEventListener('touchstart',()=>{ interacted=true; },{once:true,passive:true});
document.addEventListener('click',()=>{ interacted=true; },{once:true});

updateBest();
requestAnimationFrame(buildMenuGrid);
</script>
</body>
